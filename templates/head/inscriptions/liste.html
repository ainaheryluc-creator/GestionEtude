{% extends "head/base.html" %}
{% block content %}
<div class="action-bar">
    <div class="d-flex align-items-center">
        <div class="me-3" style="width: 4px; height: 32px; background: var(--gradient-info); border-radius: 4px;"></div>
        <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2" style="color: #06b6d4;"></i>Inscriptions</h2>
    </div>
    <a href="{{ url_for('head_inscriptions_ajouter') }}" class="btn btn-primary rounded-pill px-4"><i class="bi bi-plus-circle-fill me-1"></i> Inscrire</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead><tr><th>Étudiant</th><th>Cours</th><th>Année</th><th>Date</th><th class="text-end">Actions</th></tr></thead>
                <tbody>
                    {% for i in inscriptions %}
                    <tr>
                        <td class="fw-semibold">{{ i.etudiant_nom }}</td>
                        <td style="color: #94a3b8;">{{ i.cours_intitule }}</td>
                        <td><span class="badge bg-secondary">{{ i.annee_academique }}</span></td>
                        <td>{{ i.date_inscription }}</td>
                        <td class="text-end">
                            <form action="{{ url_for('head_inscriptions_supprimer', id=i._id) }}" method="POST" class="d-inline delete-form">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i class="bi bi-trash me-1"></i>Supprimer</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="5" class="empty-state"><i class="bi bi-pencil-square"></i><p class="mb-0">Aucune inscription.</p></td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
