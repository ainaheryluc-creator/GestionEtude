{% extends "head/base.html" %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <div class="me-3" style="width: 4px; height: 32px; background: var(--gradient-success); border-radius: 4px;"></div>
    <h2 class="fw-bold mb-0">{{ "Modifier" if cours and cours._id else "Ajouter" }} un cours</h2>
</div>
<div class="card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Code</label><input type="text" name="code" class="form-control" value="{{ cours.code if cours else '' }}" required></div>
                <div class="col-md-8"><label class="form-label">Intitulé</label><input type="text" name="intitule" class="form-control" value="{{ cours.intitule if cours else '' }}" required></div>
                <div class="col-md-4">
                    <label class="form-label">Semestre</label>
                    <select name="semestre" class="form-select">
                        {% for s in semestres %}
                        <option value="{{ s }}" {% if cours and cours.semestre == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">UE (Unité d'Enseignement)</label>
                    <select name="code_ue" class="form-select">
                        {% for u in ues %}
                        <option value="{{ u }}" {% if cours and cours.code_ue == u %}selected{% endif %}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Crédit (coefficient)</label><input type="number" name="credit" class="form-control" value="{{ cours.credit if cours else '3' }}" min="1" max="30"></div>
                <div class="col-md-12"><label class="form-label">Enseignant</label><input type="text" name="enseignant" class="form-control" value="{{ cours.enseignant if cours else '' }}" required></div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary rounded-pill px-4"><i class="bi bi-check-lg me-1"></i> Enregistrer</button>
                <a href="{{ url_for('head_cours_liste') }}" class="btn btn-secondary rounded-pill px-4"><i class="bi bi-x-lg me-1"></i> Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
